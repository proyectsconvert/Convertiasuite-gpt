variables:
  RADAR_ENABLED:
    value: "false"
    description: "Activa el job tech-debt (radar de deuda técnica) en pipelines programados"
  SECURITY_SCAN_ENABLED:
    value: "false"
    description: "Activa los jobs de seguridad (pip-audit, npm-audit, container-scan, security-radar) en pipelines programados"

stages:
  - test
  - security
  - deploy
  - scheduled-analysis

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

test:
  stage: test
  image: python:3.11
  script:
    - cd back
    - pip install -r requirements.txt
    - python -m py_compile *.py

deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
  resource_group: production
  before_script:
    - apk add --no-cache openssh-client curl
    - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
    - chmod +x /usr/local/bin/cloudflared
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H deploy.testbot.click >> ~/.ssh/known_hosts
    - |
      echo "Host deploy.testbot.click
        ProxyCommand cloudflared access ssh --hostname %h --id $CF_ACCESS_CLIENT_ID --secret $CF_ACCESS_CLIENT_SECRET" >> ~/.ssh/config
  script:
    - ssh "$SERVER_USER@deploy.testbot.click"
        "cd $SERVER_PROJECT_PATH &&
         sudo git fetch origin master &&
         sudo git reset --hard origin/master &&
         sudo docker compose -f docker-compose-prod.yml up -d --build"

.security_rule: &security_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SECURITY_SCAN_ENABLED == "true"'

tech-debt:
  stage: scheduled-analysis
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RADAR_ENABLED == "true"'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git grep > /dev/null
    - pip install --quiet radon requests
    - git fetch --unshallow || true
  script:
    - python3 tech_debt_radar.py
  variables:
    GIT_DEPTH: 0
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

pip-audit:
  stage: security
  image: python:3.11-slim
  <<: *security_rule
  script:
    - pip install --quiet pip-audit
    - pip-audit -r back/requirements.txt --format json -o pip-audit-report.json || true
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

npm-audit:
  stage: security
  image: node:20-slim
  <<: *security_rule
  script:
    - cd front
    - npm audit --json > ../npm-audit-report.json || true
  artifacts:
    when: always
    paths:
      - npm-audit-report.json
    expire_in: 1 week

container-scan:
  stage: security
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  <<: *security_rule
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker compose -f docker-compose-prod.yml build
    - mkdir -p trivy-reports
    - |
      for img in $(docker compose -f docker-compose-prod.yml config --images); do
        safe_name=$(echo "$img" | tr '/:' '__')
        trivy image --format json --output "trivy-reports/${safe_name}.json" --timeout 10m "$img" || true
      done
  artifacts:
    when: always
    paths:
      - trivy-reports/
    expire_in: 1 week

security-radar:
  stage: scheduled-analysis
  image: python:3.11-slim
  <<: *security_rule
  needs:
    - pip-audit
    - npm-audit
    - container-scan
  before_script:
    - pip install --quiet requests
  script:
    - python3 security_radar.py
  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"