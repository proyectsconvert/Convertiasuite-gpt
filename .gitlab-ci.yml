stages:
  - test
  - security
  - deploy

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

test:
  stage: test
  image: python:3.11
  script:
    - cd back
    - pip install -r requirements.txt
    - python -m py_compile *.py

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass curl
    - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
    - chmod +x /usr/local/bin/cloudflared
    - mkdir -p ~/.ssh
    - echo "Host deploy.testbot.click" >> ~/.ssh/config
    - echo "  ProxyCommand cloudflared access ssh --hostname %h --id $CF_ACCESS_CLIENT_ID --secret $CF_ACCESS_CLIENT_SECRET" >> ~/.ssh/config
  script:
    - sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no "$SERVER_USER@deploy.testbot.click"
        "cd $SERVER_PROJECT_PATH &&
         sudo git stash &&
         sudo git pull origin master &&
         sudo docker compose -f docker-compose-prod.yml down &&
         sudo docker compose -f docker-compose-prod.yml up -d --build"
  only:
    - master