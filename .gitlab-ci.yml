spec:
  inputs:
    radar:
      type: boolean
      default: false
      description: "Ejecuta análisis de deuda técnica"

    security_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de seguridad"

    dependency_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de dependencias"

    ci_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de CI/CD"

    architecture_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de arquitectura"
---
stages:
  - lint
  - test
  - security
  - scheduled-analysis
  - build
  - deploy

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

cache:
  paths:
    - .cache/pip/
    - front/node_modules/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.security_rule: &security_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.security_scan ]] == true'

.tech_debt_rule: &tech_debt_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.radar ]] == true'

.dependency_rule: &dependency_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.dependency_scan ]] == true'

.ci_rule: &ci_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.ci_scan ]] == true'

.architecture_rule: &architecture_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.architecture_scan ]] == true'

pip-audit:
  stage: security
  image: python:3.11-slim
  <<: *security_rule

  script:
    - pip install --quiet pip-audit
    - pip-audit -r back/requirements.txt --format json -o pip-audit-report.json || true

  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

npm-audit:
  stage: security
  image: node:20-slim
  <<: *security_rule

  script:
    - npm audit --json > npm-audit-report.json || true

  artifacts:
    when: always
    paths:
      - npm-audit-report.json
    expire_in: 1 week

container-scan:
  stage: security
  image: docker:24-cli

  services:
    - docker:24-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  <<: *security_rule

  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  script:
    - docker compose -f docker-compose-prod.yml build
    - mkdir -p trivy-reports

    - |
      for img in $(docker compose -f docker-compose-prod.yml config --images); do
        safe_name=$(echo "$img" | tr '/:' '__')

        trivy image \
          --format json \
          --output "trivy-reports/${safe_name}.json" \
          --timeout 10m \
          "$img" || true
      done

  artifacts:
    when: always
    paths:
      - trivy-reports/
    expire_in: 1 week

tech-debt:
  stage: scheduled-analysis
  image: python:3.11-slim

  <<: *tech_debt_rule

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq git grep nodejs npm
    - pip install --quiet radon requests

  script:
    - git fetch --unshallow || true

    - cd front
    - npm ci --silent

    - npm run lint \
      -- --format json \
      --output-file ../eslint-report.json || true

    - cd ..

    - python3 tech_debt_radar.py

  variables:
    GIT_DEPTH: 0
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

security-radar:
  stage: scheduled-analysis
  image: python:3.11-slim

  <<: *security_rule

  needs:
    - job: pip-audit
      artifacts: true

    - job: npm-audit
      artifacts: true

    - job: container-scan
      artifacts: true

  before_script:
    - pip install --quiet requests

  script:
    - python3 security_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

dependency-radar:
  stage: scheduled-analysis
  image: python:3.11-slim

  <<: *dependency_rule

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq nodejs npm
    - pip install --quiet requests
    - if [ -f back/requirements.txt ]; then pip install --quiet -r back/requirements.txt; fi
    - if [ -f front/package.json ]; then (cd front && npm ci --silent); fi

  script:
    - python3 dependency_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

ci-radar:
  stage: scheduled-analysis
  image: python:3.11-slim

  <<: *ci_rule

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq nodejs npm
    - pip install --quiet requests

  script:
    - python3 ci_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

architecture-radar:
  stage: scheduled-analysis
  image: python:3.11-slim
 
  <<: *architecture_rule
 
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq git
    - pip install --quiet requests vulture pytest
    - if [ -f back/requirements.txt ]; then pip install --quiet -r back/requirements.txt; fi
 
  script:
    - git fetch --unshallow || true
    - python3 architecture_radar.py
 
  variables:
    GIT_DEPTH: 0
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"
 