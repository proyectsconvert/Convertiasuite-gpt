stages:
  - test
  - security
  - deploy

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  
test:
  stage: test
  image: python:3.11
  script:
    - cd back
    - pip install -r requirements.txt
    - python -m py_compile *.py

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass
    - mkdir -p ~/.ssh
    - echo "validando conexión ip..." 
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts || true
  script:
    - export SSHPASS=$SERVER_PASSWORD
    - sshpass -e ssh $SERVER_USER@$SERVER_IP "cd $SERVER_PROJECT_PATH && echo $SSHPASS | sudo -S git pull origin master && echo $SSHPASS | sudo -S docker compose -f docker-compose-prod.yml up -d --build"
  only:
    - master