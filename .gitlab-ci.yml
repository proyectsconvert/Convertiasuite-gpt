spec:
  inputs:
    radar:
      type: boolean
      default: false
      description: "Ejecuta análisis de deuda técnica"

    security_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de seguridad"

    dependency_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de dependencias"

    ci_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de CI/CD"

    architecture_scan:
      type: boolean
      default: false
      description: "Ejecuta radar de arquitectura"

    test_generator:
      type: boolean
      default: false
      description: "Ejecuta generación de tests"

    rag_generator:
      type: boolean
      default: false
      description: "Ejecuta generación de RAG (ingestión de documentos y embeddings)"
---
stages:
  - build-ci-image
  - lint
  - test
  - security
  - scheduled-analysis
  - rag-ingest
  - test-generation
  - build
  - deploy
  

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

cache:
  paths:
    - .cache/pip/
    - front/node_modules/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CI_TOOLS_IMAGE: "$CI_REGISTRY_IMAGE/ci-tools:latest"


build-ci-tools:
  stage: build-ci-image
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - Dockerfile.ci-tools
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -f Dockerfile.ci-tools -t "$CI_TOOLS_IMAGE" .
    - docker push "$CI_TOOLS_IMAGE"

.security_rule: &security_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.security_scan ]] == true'

.tech_debt_rule: &tech_debt_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.radar ]] == true'

.dependency_rule: &dependency_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.dependency_scan ]] == true'

.ci_rule: &ci_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.ci_scan ]] == true'

.architecture_rule: &architecture_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.architecture_scan ]] == true'

.test_generator_rule: &test_generator_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.test_generator ]] == true'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

.rag_generator_rule: &rag_generator_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.rag_generator ]] == true'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

pip-audit:
  stage: security
  image: python:3.11-slim
  <<: *security_rule

  script:
    - pip install --quiet pip-audit
    - pip-audit -r back/requirements.txt --format json -o pip-audit-report.json || true

  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

npm-audit:
  stage: security
  image: node:20-slim
  <<: *security_rule

  script:
    - npm audit --json > npm-audit-report.json || true

  artifacts:
    when: always
    paths:
      - npm-audit-report.json
    expire_in: 1 week

container-scan:
  stage: security
  image: docker:24-cli

  services:
    - docker:24-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  <<: *security_rule

  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

  script:
    - docker compose -f docker-compose-prod.yml build
    - mkdir -p trivy-reports

    - |
      for img in $(docker compose -f docker-compose-prod.yml config --images); do
        safe_name=$(echo "$img" | tr '/:' '__')

        trivy image \
          --format json \
          --output "trivy-reports/${safe_name}.json" \
          --timeout 10m \
          "$img" || true
      done

  artifacts:
    when: always
    paths:
      - trivy-reports/
    expire_in: 1 week

tech-debt:
  stage: scheduled-analysis
  image: "$CI_TOOLS_IMAGE"

  <<: *tech_debt_rule

  script:
    - git fetch --unshallow || true

    - cd front
    - npm ci --silent

    - npm run lint \
      -- --format json \
      --output-file ../eslint-report.json || true

    - cd ..

    - python3 tech_debt_radar.py

  variables:
    GIT_DEPTH: 0
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

security-radar:
  stage: scheduled-analysis
  image: "$CI_TOOLS_IMAGE"

  <<: *security_rule

  needs:
    - job: pip-audit
      artifacts: true

    - job: npm-audit
      artifacts: true

    - job: container-scan
      artifacts: true

  script:
    - python3 security_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

dependency-radar:
  stage: scheduled-analysis
  image: "$CI_TOOLS_IMAGE"

  <<: *dependency_rule

  before_script:
    - if [ -f back/requirements.txt ]; then pip install --quiet -r back/requirements.txt; fi
    - if [ -f front/package.json ]; then (cd front && npm ci --silent); fi

  script:
    - python3 dependency_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

ci-radar:
  stage: scheduled-analysis
  image: "$CI_TOOLS_IMAGE"

  <<: *ci_rule

  script:
    - python3 ci_radar.py

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

architecture-radar:
  stage: scheduled-analysis
  image: "$CI_TOOLS_IMAGE"
 
  <<: *architecture_rule
 
  before_script:
    - if [ -f back/requirements.txt ]; then pip install --quiet -r back/requirements.txt; fi
 
  script:
    - python3 architecture_radar.py
 
  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"
 
test-generator:
  stage: test-generation
  image: "$CI_TOOLS_IMAGE"

  <<: *test_generator_rule 

  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"
    MR_BRANCH: "auto/test-generation-${CI_PIPELINE_ID}"

  before_script:
    - if [ -f back/requirements.txt ]; then pip install --quiet -r back/requirements.txt; fi
    - if [ -f front/package.json ]; then (cd front && npm ci --silent); fi

  script:
    - python3 test_generator.py
    - |
      if [ -f .tests_generated ]; then
        git config user.email "ci-bot@$CI_SERVER_HOST"
        git config user.name "CI Test Generator"
        git checkout -b "$MR_BRANCH"
        git add .
        git commit -m "test: generar tests faltantes [skip ci]"
        git push "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$MR_BRANCH"

        curl --request POST \
          --header "PRIVATE-TOKEN: ${GIT_PUSH_TOKEN}" \
          --data "source_branch=${MR_BRANCH}" \
          --data "target_branch=${CI_DEFAULT_BRANCH}" \
          --data "title= Tests generados automáticamente" \
          --data "description=MR generado por el pipeline ${CI_PIPELINE_ID}. Revisar antes de mergear." \
          "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests"
      else
        echo "No había tests faltantes, nada que generar."
      fi

  artifacts:
    when: always
    paths:
      - test_generation_report.json
    expire_in: 1 week

rag-ingest:
  stage: rag-ingest
  image: python:3.11-slim

  <<: *rag_generator_rule

  before_script:
    - pip install --quiet requests pypdf python-docx openpyxl

  script:
    - python3 rag_ingest.py