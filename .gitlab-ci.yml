spec:
  inputs:
    radar:
      type: boolean
      default: false
      description: "Si es true, ejecuta el job tech-debt en este pipeline"
    security_scan:
      type: boolean
      default: false
      description: "Si es true, ejecuta el radar de seguridad (pip-audit, npm audit, Trivy) en este pipeline"
---
stages:
  - test
  - security
  - deploy
  - scheduled-analysis

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

test:
  stage: test
  image: python:3.11
  script:
    - cd back
    - pip install -r requirements.txt
    - python -m py_compile *.py

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass curl
    - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
    - chmod +x /usr/local/bin/cloudflared
    - mkdir -p ~/.ssh
    - echo "Host deploy.testbot.click" >> ~/.ssh/config
    - echo "  ProxyCommand cloudflared access ssh --hostname %h --id $CF_ACCESS_CLIENT_ID --secret $CF_ACCESS_CLIENT_SECRET" >> ~/.ssh/config
  script:
    - sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no "$SERVER_USER@deploy.testbot.click"
        "cd $SERVER_PROJECT_PATH &&
         sudo git stash &&
         sudo git pull origin master &&
         sudo docker compose -f docker-compose-prod.yml down &&
         sudo docker compose -f docker-compose-prod.yml up -d --build"
  only:
    - master

tech-debt:
  stage: scheduled-analysis
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.radar ]] == true'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git grep > /dev/null
    - pip install --quiet radon requests
    - git fetch --unshallow || true
  script:
    - python3 tech_debt_radar.py
  variables:
    GIT_DEPTH: 0
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"
    
.security_rule: &security_rule
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $[[ inputs.security_scan ]] == true'

pip-audit:
  stage: security
  image: python:3.11-slim
  <<: *security_rule
  script:
    - pip install --quiet pip-audit
    - pip-audit -r back/requirements.txt --format json -o pip-audit-report.json || true
  artifacts:
    when: always
    paths:
      - pip-audit-report.json
    expire_in: 1 week

npm-audit:
  stage: security
  image: node:20-slim
  <<: *security_rule
  script:
    - npm audit --json > npm-audit-report.json || true
  artifacts:
    when: always
    paths:
      - npm-audit-report.json
    expire_in: 1 week

container-scan:
  stage: security
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  <<: *security_rule
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker compose -f docker-compose-prod.yml build
    - mkdir -p trivy-reports
    - |
      for img in $(docker compose -f docker-compose-prod.yml config --images); do
        safe_name=$(echo "$img" | tr '/:' '__')
        trivy image --format json --output "trivy-reports/${safe_name}.json" --timeout 10m "$img" || true
      done
  artifacts:
    when: always
    paths:
      - trivy-reports/
    expire_in: 1 week

security-radar:
  stage: scheduled-analysis
  image: python:3.11-slim
  <<: *security_rule
  needs:
    - pip-audit
    - npm-audit
    - container-scan
  before_script:
    - pip install --quiet requests
  script:
    - python3 security_radar.py
  variables:
    OLLAMA_HOST: "$OLLAMA_BASE_URL"
    OLLAMA_MODEL: "qwen2.5:7b"

# Proposed additions and improvements below
stages:
  - lint
  - test
  - security
  - build
  - deploy
  - scheduled-analysis

# global caches for speed
cache:
  paths:
    - .cache/pip/
    - node_modules/

variables:
  PIP_CACHE_DIR: ".cache/pip"
  NODE_ENV: "production"

lint-backend:
  stage: lint
  image: python:3.11-slim
  script:
    - cd back
    - pip install --quiet ruff
    - ruff check . || true

lint-frontend:
  stage: lint
  image: node:20-slim
  script:
    - cd front
    - npm ci --silent
    - npm run lint || true

backend-test:
  stage: test
  image: python:3.11
  services: []
  before_script:
    - cd back
    - python -m venv venv
    - . venv/bin/activate || .\venv\Scripts\activate || true
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest -q --junitxml=reports/junit.xml || true
  artifacts:
    when: always
    paths:
      - back/reports/
    expire_in: 1 week

frontend-test:
  stage: test
  image: node:20-slim
  before_script:
    - cd front
    - npm ci --silent
  script:
    - npm run test --silent || true
    - npm run build --if-present --silent || true
  artifacts:
    when: always
    paths:
      - front/dist/
    expire_in: 1 week

# Keep the existing security jobs: pip-audit, npm-audit, container-scan

build:
  stage: build
  image: docker:24-cli
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
  script:
    - docker compose -f docker-compose-prod.yml build --pull
  artifacts:
    when: on_success
    paths:
      - docker-images-list.txt

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H deploy.testbot.click >> ~/.ssh/known_hosts || true
  script:
    - ssh -o StrictHostKeyChecking=no "$SERVER_USER@deploy.testbot.click" \
        "cd $SERVER_PROJECT_PATH && sudo git pull origin master && sudo docker compose -f docker-compose-prod.yml down && sudo docker compose -f docker-compose-prod.yml up -d --build"
  only:
    - master
  when: manual

# Notes:
# - Use protected variables: SSH_PRIVATE_KEY, SERVER_USER, SERVER_PROJECT_PATH, SERVER_PASSWORD (if used), OLLAMA_BASE_URL
# - Replace `sshpass` usage with `SSH_PRIVATE_KEY` for improved security.