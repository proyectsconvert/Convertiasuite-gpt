version: '3.8'

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./back/.env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./back:/app
    working_dir: /app
    networks:
      - convertia-net

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:8000
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8083:8080"
    depends_on:
      - backend
    volumes:
      - ./front:/app
      - /app/node_modules
    networks:
      - convertia-net

networks:
  convertia-net:
    external: true
