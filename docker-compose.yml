version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./back/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./back:/app
    working_dir: /app          # ← asegúrate que sea /app, no /app/app               
  frontend:
    build:
      context: ./front      
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:8000
    container_name: frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./front:/app           
      - /app/node_modules

volumes:
  redis_data: